{% extends "base.html" %}

{% block title %}Register - Health Track{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card login-card">
            <div class="card-header text-center">
                <div class="login-icon mb-3">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h3 class="mb-0">Register</h3>
                <p class="mb-0 mt-2" style="opacity: 0.9; font-size: 0.9rem;">Create a new account and get started</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('register') }}" id="registerForm">
                    <div class="mb-4">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input type="text" 
                               class="form-control form-control-lg" 
                               id="username" 
                               name="username" 
                               required
                               placeholder="Enter your username"
                               autocomplete="username">
                    </div>
                    <div class="mb-4">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email" 
                               class="form-control form-control-lg" 
                               id="email" 
                               name="email" 
                               required
                               placeholder="Enter your email"
                               autocomplete="email">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" 
                               class="form-control form-control-lg" 
                               id="password" 
                               name="password" 
                               required 
                               minlength="6"
                               placeholder="At least 6 characters"
                               autocomplete="new-password">
                        <small class="text-muted d-block mt-2">
                            <i class="fas fa-info-circle"></i> Password must be at least 6 characters
                        </small>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="fas fa-user-plus"></i> Register
                    </button>
                </form>
                <hr class="my-4">
                <div class="text-center">
                    <p class="mb-0">Already have an account? 
                        <a href="{{ url_for('login') }}" class="fw-bold" style="color: var(--blue);">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.login-card {
    animation: fadeIn 0.6s ease-out;
}

.form-control-lg {
    padding: 1rem 1.25rem;
    font-size: 1rem;
}

.btn-lg {
    padding: 1rem 2rem;
    font-size: 1.1rem;
}
</style>
{% endblock %}
